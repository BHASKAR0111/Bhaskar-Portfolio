<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhaskar Baluni | Data Analyst</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#04080d;
  --accent:#00d4ff;
  --text:#dde8f0;
}

/* BODY */
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  overflow:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* PHOTO */
.photo-wrap{
  position:relative;
  width:280px;
  height:380px;
}

.photo-frame{
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(0,212,255,0.3);
}

.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
h1{
  margin-top:20px;
  font-size:2.5rem;
}

p{
  color:#6a8099;
}

</style>
</head>

<body>

<div class="hero">

  <div class="photo-wrap">
    <canvas id="photoCanvas"></canvas>
    <div class="photo-frame">
      <img src="images/myphoto.jpg" alt="">
    </div>
  </div>

  <h1>Bhaskar Baluni</h1>
  <p>Data Analyst & ML Engineer</p>

</div>

<script>

/* PHOTO ANIMATION (3D RING) */
(function(){

const canvas=document.getElementById('photoCanvas');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true});
renderer.setSize(300,400);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,300/400,0.1,100);
camera.position.z=3;

const ring=new THREE.Mesh(
  new THREE.TorusGeometry(1.1,0.02,16,100),
  new THREE.MeshBasicMaterial({color:0x00d4ff})
);

scene.add(ring);

function animate(){
  requestAnimationFrame(animate);
  ring.rotation.z+=0.01;
  renderer.render(scene,camera);
}

animate();

})();

</script>

</body>
</html>
