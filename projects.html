<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Analysis | Bhaskar Baluni</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#080809;
  --bg2:#0f1012;
  --bg3:#161719;
  --silver:#c8c9cc;
  --white:#f4f4f5;
  --dim:#5a5b5e;
  --dimmer:#2a2b2d;
  --border:rgba(200,201,204,.1);
  --accent-red:#ff4d6d;
}

body{
  background:var(--bg);
  color:var(--white);
  font-family:"DM Mono", monospace;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  background:rgba(8,8,9,.9);
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:"Syne";
  font-weight:800;
  letter-spacing:.2em;
}

/* MAIN */
main{
  padding:120px 60px 60px;
}

/* TITLE */
.title{
  margin-bottom:40px;
}

.title h1{
  font-family:"Syne";
  font-size:2.5rem;
}

.title p{
  color:var(--dim);
  margin-top:10px;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.kpi{
  background:var(--bg2);
  border:1px solid var(--border);
  padding:20px;
  transition:.3s;
}

.kpi:hover{
  background:var(--bg3);
  border-color:rgba(200,201,204,.2);
}

.kpi h3{
  font-size:.7rem;
  color:var(--dim);
}

.kpi p{
  font-family:"Syne";
  font-size:1.8rem;
  color:var(--silver);
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  padding:20px;
  transition:.3s;
}

.card:hover{
  background:var(--bg3);
  border-color:rgba(200,201,204,.2);
}

.card h3{
  margin-bottom:15px;
  font-family:"Syne";
}

/* BACK BTN */
.back{
  margin-top:40px;
  display:inline-block;
  color:var(--silver);
  text-decoration:none;
  border-bottom:1px solid var(--dimmer);
}

/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:20px;}
  main{padding:120px 20px;}
}
</style>
</head>

<body>

<nav>
  <div class="logo">BB</div>
</nav>

<main>

<div class="title">
  <h1>Customer Churn Analysis</h1>
  <p>Power BI dashboard recreated in web — portfolio styled UI</p>
</div>

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi">
    <h3>Total Customers</h3>
    <p>7043</p>
  </div>
  <div class="kpi">
    <h3>Churn Rate</h3>
    <p>26.5%</p>
  </div>
  <div class="kpi">
    <h3>Month-to-Month</h3>
    <p>42.7%</p>
  </div>
  <div class="kpi">
    <h3>Two-Year</h3>
    <p>2.8%</p>
  </div>
</div>

<!-- CHARTS -->
<div class="grid">

  <!-- DONUT -->
  <div class="card">
    <h3>Churn Distribution</h3>
    <canvas id="donut"></canvas>
  </div>

  <!-- BAR -->
  <div class="card">
    <h3>Contract Type Churn</h3>
    <canvas id="bar"></canvas>
  </div>

</div>

<a href="index.html" class="back">← Back to Portfolio</a>

</main>

<script>

// DONUT CHART (FIXED WITH ACCENT 🔴)
new Chart(document.getElementById('donut'), {
  type:'doughnut',
  data:{
    labels:['Retained','Churned'],
    datasets:[{
      data:[73.5,26.5],
      backgroundColor:[
        '#c8c9cc',   // retained
        '#ff4d6d'    // churned (highlight 🔥)
      ],
      borderWidth:0
    }]
  },
  options:{
    cutout:'65%',
    plugins:{
      legend:{
        labels:{
          color:'#c8c9cc'
        }
      }
    }
  }
});


// BAR CHART (SMART COLOR LOGIC)
new Chart(document.getElementById('bar'), {
  type:'bar',
  data:{
    labels:['Month-to-Month','1 Year','2 Year'],
    datasets:[{
      data:[42.7,11.3,2.8],
      backgroundColor:[
        '#ff4d6d',  // high churn 🔴
        '#9a9b9e',  // medium
        '#c8c9cc'   // low churn
      ],
      borderRadius:6
    }]
  },
  options:{
    plugins:{
      legend:{display:false}
    },
    scales:{
      x:{
        grid:{display:false},
        ticks:{color:'#c8c9cc'}
      },
      y:{
        grid:{color:'rgba(255,255,255,0.05)'},
        ticks:{color:'#5a5b5e'}
      }
    }
  }
});

</script>

</body>
</html>
