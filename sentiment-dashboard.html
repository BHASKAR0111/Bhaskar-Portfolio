<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Sentiment Analysis | Bhaskar Baluni</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#080809;
  --bg2:#0f1012;
  --bg3:#161719;
  --silver:#c8c9cc;
  --white:#f4f4f5;
  --dim:#5a5b5e;
  --border:rgba(200,201,204,.1);

  --positive:#22c55e;
  --negative:#ef4444;
  --neutral:#eab308;
}

body{
  background:var(--bg);
  color:var(--white);
  font-family:"DM Mono", monospace;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(8,8,9,.9);
}

.logo{
  font-family:"Syne";
  font-weight:800;
}

/* MAIN */
main{
  padding:120px 60px;
}

/* TITLE */
h1{
  font-family:"Syne";
  font-size:2.5rem;
}

.sub{
  color:var(--dim);
  margin:10px 0 40px;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.kpi{
  background:var(--bg2);
  border:1px solid var(--border);
  padding:20px;
}

.kpi h3{
  font-size:.7rem;
  color:var(--dim);
}

.kpi p{
  font-size:1.6rem;
  font-family:"Syne";
}

/* CHART */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  padding:20px;
  margin-bottom:20px;
}

.card h3{
  margin-bottom:10px;
  font-family:"Syne";
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">BB</div>
</nav>

<main>

<h1>YouTube Sentiment Analysis</h1>
<p class="sub">NLP pipeline using TextBlob + YouTube API</p>

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi"><h3>Total Comments</h3><p>800</p></div>
  <div class="kpi"><h3>Positive</h3><p style="color:var(--positive)">58%</p></div>
  <div class="kpi"><h3>Negative</h3><p style="color:var(--negative)">15%</p></div>
  <div class="kpi"><h3>Neutral</h3><p style="color:var(--neutral)">27%</p></div>
</div>

<div class="grid">

  <!-- DONUT -->
  <div class="card">
    <h3>Sentiment Distribution</h3>
    <canvas id="donut"></canvas>
  </div>

  <!-- BAR -->
  <div class="card">
    <h3>Polarity Distribution</h3>
    <canvas id="bar"></canvas>
  </div>

</div>

</main>

<script>

// DONUT
new Chart(document.getElementById('donut'),{
  type:'doughnut',
  data:{
    labels:['Positive','Neutral','Negative'],
    datasets:[{
      data:[58,27,15],
      backgroundColor:[
        '#22c55e',
        '#eab308',
        '#ef4444'
      ]
    }]
  }
});

// BAR
new Chart(document.getElementById('bar'),{
  type:'bar',
  data:{
    labels:['Very Negative','Negative','Neutral','Positive','Very Positive'],
    datasets:[{
      data:[48,62,95,210,245],
      backgroundColor:[
        '#ef4444',
        '#f87171',
        '#eab308',
        '#86efac',
        '#22c55e'
      ]
    }]
  },
  options:{
    plugins:{legend:{display:false}}
  }
});

</script>

</body>
</html>
